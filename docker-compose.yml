services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pogcc-backend
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./config.json:/app/config.json
      - ./app/data:/app/app/data
      - ./app/rag/data_index:/app/app/rag/data_index
      - ./app/rag/uploads:/app/app/rag/uploads
      - ./app/rag/bge-small-en-v1.5:/app/app/rag/bge-small-en-v1.5:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_USE_MOCK: ${VITE_USE_MOCK:-false}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://1.94.146.105}
    container_name: pogcc-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
