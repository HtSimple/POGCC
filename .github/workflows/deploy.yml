name: Deploy POGCC to Huawei Cloud ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pogcc-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          ECS_SSH_KEY_B64: ${{ secrets.ECS_SSH_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${ECS_SSH_KEY_B64:-}" ]; then
            printf '%s' "$ECS_SSH_KEY_B64" | base64 -d > ~/.ssh/ecs_key
          else
            printf '%s' "$ECS_SSH_KEY" | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/ecs_key
            printf '\n' >> ~/.ssh/ecs_key
          fi
          chmod 600 ~/.ssh/ecs_key
          ssh-keygen -y -f ~/.ssh/ecs_key > /dev/null
          ssh-keyscan -p "$ECS_PORT" -H "$ECS_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote app directory
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          ssh -i ~/.ssh/ecs_key \
            -p "$ECS_PORT" \
            "$ECS_USER@$ECS_HOST" \
            "APP_DIR='$APP_DIR' bash -s" <<'REMOTE'
          set -euo pipefail
          mkdir -p "$APP_DIR"
          mkdir -p "$APP_DIR/app/data" "$APP_DIR/app/rag/data_index" "$APP_DIR/app/rag/uploads" "$APP_DIR/app/rag/bge-small-en-v1.5"
          REMOTE

      - name: Sync files to ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/ecs_key -p $ECS_PORT" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "部署流程说明.md" \
            --exclude ".env" \
            --exclude "config.json" \
            --exclude "app/data/" \
            --exclude "app/rag/data_index/" \
            --exclude "app/rag/uploads/" \
            --exclude "app/rag/bge-small-en-v1.5/" \
            --exclude "frontend/node_modules/" \
            --exclude "frontend/dist/" \
            ./ "$ECS_USER@$ECS_HOST:$APP_DIR/"

      - name: Deploy on ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          ssh -i ~/.ssh/ecs_key \
            -p "$ECS_PORT" \
            "$ECS_USER@$ECS_HOST" \
            "APP_DIR='$APP_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$APP_DIR"

          if [ ! -f docker-compose.yml ]; then
            echo "docker-compose.yml not found in $APP_DIR"
            exit 1
          fi

          if [ ! -f config.json ]; then
            echo "config.json not found. Create it on the server before deploying."
            exit 1
          fi

          if [ ! -f .env ]; then
            echo ".env not found. Create it on the server before deploying."
            exit 1
          fi

          mkdir -p app/data app/rag/data_index app/rag/uploads app/rag/bge-small-en-v1.5

          docker compose config
          docker compose up -d --build --remove-orphans
          docker compose ps

          sleep 8
          curl -fsS --max-time 20 http://127.0.0.1/health
          REMOTE

      - name: Verify public endpoint
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
        run: |
          curl -fsS --max-time 20 "http://${ECS_HOST}/health"
